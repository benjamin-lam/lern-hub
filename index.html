<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wissens-Hub</title>
    <style>
        /* BASIS DESIGN (Mobile First) */
        :root { --primary: #FFD700; --secondary: #FF4500; --bg: #F0F8FF; }
        body { font-family: 'Comic Sans MS', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; cursor: pointer; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input { padding: 15px; width: 100%; max-width: 400px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 20px; font-size: 1rem; }
        
        /* Level-Styles */
        .level-grundschule { border-color: #FFD700; }
        .level-sekundar { border-color: #2c3e50; font-family: sans-serif; border-radius: 5px; }
        
        .exit-btn { margin-top: 40px; padding: 15px 30px; background: #32CD32; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }

        /* Grundschul-Modus: Bunt & Verspielt */
body.mode-grundschule {
    --primary: #FFD700;
    --bg: #F0F8FF;
    font-family: 'Comic Sans MS', cursive;
}
body.mode-grundschule .card { border-radius: 30px; border-width: 5px; }

/* Sekundar-Modus: Clean & Technisch */
body.mode-sekundar {
    --primary: #2c3e50;
    --secondary: #34495e;
    --bg: #ffffff;
    font-family: 'Segoe UI', sans-serif;
}
body.mode-sekundar .card { border-radius: 4px; border-left: 8px solid var(--primary); border-top: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee; }

/* Aktiver Button Style */
.filter-btn { padding: 8px 15px; border: 2px solid var(--primary); border-radius: 20px; cursor: pointer; background: white; }
.filter-btn.active { background: var(--primary); color: white; }

    </style>
</head>
<body>

<header id="main-header">
    <!-- Neuer dezenter Rückweg -->
    <nav id="breadcrumb" class="hidden" style="margin-bottom: 10px; font-size: 0.9rem;">
        <a href="index.html" style="color: var(--secondary); text-decoration: none;">🏠 Alle Fächer</a> 
        <span id="breadcrumb-separator"> > </span> 
        <span id="current-category">Mathe</span>
    </nav>
    
    <h1 id="view-title">Lern-Explorer</h1>
    <input type="text" id="filterInput" placeholder="Suchen..." onkeyup="filterView()">

    <div id="level-selector" style="margin-bottom: 20px; display: flex; gap: 10px; justify-content: center;">
    <button onclick="setLevel('grundschule')" id="btn-grundschule" class="filter-btn">🧸 Grundschule</button>
    <button onclick="setLevel('sekundar')" id="btn-sekundar" class="filter-btn">🔬 Weiterführend</button>
    <button onclick="setLevel('all')" id="btn-all" class="filter-btn">Alle</button>
</div>

</header>


    <div id="content-grid" class="grid">
        <!-- Hier wird alles dynamisch geladen -->
    </div>

    <div id="detail-view" class="hidden">
        <!-- Deine Detail-Ansicht kommt hier rein -->
    </div>

    <script>
        // Logik zur Steuerung der Ansichten
        const urlParams = new URLSearchParams(window.location.search);
        const view = urlParams.get('view'); // null (Home), 'thema', oder 'karte'
        const path = urlParams.get('path'); 

        async function init() {
            if (!view) {
                renderHome();
            } else if (view === 'thema') {
                renderThema(path);
            } else if (view === 'karte') {
                renderKarte(path);
            }
        }

        // 1. STARTSEITE: Themengebiete
        async function renderHome() {
            document.getElementById('view-title').innerText = "Wähle ein Fach";
            const res = await fetch('themen.json');
            const data = await res.json();
            const grid = document.getElementById('content-grid');
            grid.innerHTML = data.map(t => `
                <div class="card" onclick="location.href='?view=thema&path=${t.slug}'">
                    <h2>${t.icon} ${t.name}</h2>
                    <p>${t.beschreibung}</p>
                </div>
            `).join('');
        }

// 2. THEMEN-ÜBERSICHT: Lernkarten eines Fachs
async function renderThema(slug) {
    const grid = document.getElementById('content-grid');
    const breadcrumb = document.getElementById('breadcrumb');
    const categorySpan = document.getElementById('current-category');
    
    // Breadcrumb sichtbar machen
    breadcrumb.classList.remove('hidden');
    categorySpan.innerText = slug.charAt(0).toUpperCase() + slug.slice(1)
    
    const title = document.getElementById('view-title');
    title.innerText = "Lade " + slug + "...";

    try {
        const url = `data/${slug}/index.json`; // Pfad zu deiner Datei
        const res = await fetch(url);
        
        if (!res.ok) {
            throw new Error(`Datei nicht gefunden: ${url} (Status: ${res.status})`);
        }

        const cards = await res.json();
        
        title.innerText = slug.charAt(0).toUpperCase() + slug.slice(1);
        grid.innerHTML = cards.map(c => `
            <div class="card level-${c.level}" onclick="location.href='?view=karte&path=${slug}/${c.id}'">
                <h3>${c.titel}</h3>
                <p>Level: ${c.level}</p>
            </div>
        `).join('');

            const currentLevel = localStorage.getItem('userLevel') || 'all';
    applyLevelFilter(currentLevel);
        
    } catch (error) {
        title.innerText = "Hoppla!";
        grid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; color: red;">
                <p>Fehler: ${error.message}</p>
                <p>Prüfe, ob der Ordner <b>data/${slug}/</b> die Datei <b>index.json</b> enthält.</p>
                <button onclick="location.href='index.html'" class="exit-btn">Zurück zum Start</button>
            </div>`;
    }
}


        // 3. DETAIL-ANSICHT: Die Lernkarte
        async function renderKarte(fullPath) {
            const res = await fetch(`data/${fullPath}.json`);
            const data = await res.json();
            
            document.body.className = "level-" + data.level; // Design anpassen
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('content-grid').classList.add('hidden');
            
            const detail = document.getElementById('detail-view');
            detail.classList.remove('hidden');
            detail.innerHTML = `
                <h1>${data.icon} ${data.titel}</h1>
                <div class="grid">
                    ${data.steps.map((s, i) => `
                        <div class="card" onclick="this.querySelector('.extra-info').toggleAttribute('hidden')">
                            <h3>${i+1}. ${s.t}</h3>
                            <p>${s.d}</p>
                            <div class="extra-info" hidden style="margin-top:10px; color:#666;">${s.info || 'Tipp: Merk dir das gut!'}</div>
                        </div>
                    `).join('')}
                </div>
                <button class="exit-btn" onclick="history.back()">⬅ Zurück zur Übersicht</button>
            `;
        }

        function filterView() {
            let input = document.getElementById('filterInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }

        // Beim Starten den Modus laden
document.addEventListener('DOMContentLoaded', () => {
    const savedLevel = localStorage.getItem('userLevel') || 'all';
    setLevel(savedLevel, false); // false = nicht neu laden, nur setzen
});

function setLevel(level, reload = true) {
    // 1. Im LocalStorage speichern
    localStorage.setItem('userLevel', level);

    // 2. CSS-Klasse am Body tauschen
    document.body.classList.remove('mode-grundschule', 'mode-sekundar');
    if (level !== 'all') {
        document.body.classList.add('mode-' + level);
    }

    // 3. Buttons optisch hervorheben
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    const activeBtn = document.getElementById('btn-' + level);
    if (activeBtn) activeBtn.classList.add('active');

    // 4. Wenn wir auf einer Übersichtsseite sind: Karten filtern
    if (view === 'thema') {
        applyLevelFilter(level);
    }
}

function applyLevelFilter(level) {
    const cards = document.getElementsByClassName('card');
    for (let card of cards) {
        if (level === 'all') {
            card.style.display = "";
        } else {
            // Wir prüfen, ob die Karte die entsprechende Klasse hat
            card.style.display = card.classList.contains('level-' + level) ? "" : "none";
        }
    }
}

        init();
        
    </script>
</body>
</html>
